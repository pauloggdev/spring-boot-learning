name: CI - Spring Boot

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Pega no código do repositório
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configura Java
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Debug Java & Maven
        run: |
            java -version
            mvn -version
      

      # 3. Cache do Maven (para acelerar builds)
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      # 4. Build do projeto
      - name: Build with Maven
        run: mvn clean package

      # 5. Rodar testes
      - name: Run tests
        run: mvn test
